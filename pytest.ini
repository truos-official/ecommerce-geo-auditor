[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --cov=.
    --cov-report=html
    --cov-report=term-missing
markers =
    integration: Integration tests (require API keys)
    slow: Slow tests
asyncio_mode = auto
